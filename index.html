<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Mission Control</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div>
        <p class="eyebrow" id="header-date"></p>
        <h1 class="app-title">Mission Control</h1>
      </div>
      <div class="topbar-actions">
        <button class="icon-button" id="theme-toggle" aria-label="Toggle dark mode">
          <span id="theme-icon">◐</span>
        </button>
        <button class="icon-button" id="refresh-btn" aria-label="Refresh data">↻</button>
      </div>
    </header>

    <main class="content" id="feed">
      <div class="loading-state" id="loading">
        <div class="loading-dots"><span></span><span></span><span></span></div>
      </div>
    </main>

    <nav class="tab-bar" aria-label="Primary">
      <button class="tab active" data-section="live">
        <span class="tab-icon">◉</span>
        <span>Live</span>
      </button>
      <button class="tab" data-section="projects">
        <span class="tab-icon">▣</span>
        <span>Projects</span>
      </button>
      <button class="tab" data-section="agent">
        <span class="tab-icon">◌</span>
        <span>Agent</span>
      </button>
      <button class="tab" data-section="decisions">
        <span class="tab-icon">◆</span>
        <span>Decisions</span>
      </button>
    </nav>
  </div>

  <script src="app.js"></script>
</body>
</html>
